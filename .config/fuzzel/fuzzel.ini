# Fuzzel — matches the Noctalia dark-purple palette.
# Palette pulled from ~/.config/noctalia/colors.json (mPrimary #b58fff, etc.)
# Font pulled from ~/.config/noctalia/settings.json (InputSans Nerd Font).
#
# Favorites: fuzzel keeps a frecency cache at ~/.cache/fuzzel (or ~/.local/state/fuzzel)
# so apps you launch often float to the top automatically — effectively your
# "favorites" without any config. For EXPLICIT pins, see the wrapper script
# at ~/.local/bin/fuzzel-favs (created alongside this config).

[main]
font=InputSans Nerd Font:weight=regular:size=13
dpi-aware=yes
prompt=">   "
icon-theme=Papirus-Dark
icons-enabled=yes
terminal=kitty
layer=overlay
exit-on-keyboard-focus-loss=yes
width=42
tabs=4
horizontal-pad=28
vertical-pad=22
inner-pad=14
line-height=28
letter-spacing=0
image-size-ratio=0.5
lines=12
show-actions=no
match-mode=fuzzy
sort-result=yes
match-counter=no

[colors]
# All values are RRGGBBAA (alpha last).
# Background: Noctalia's mSurface (#000000) with slight transparency so the
# blur behind feels nice on transparent compositors.
background=0a0612ee
# Main text: Noctalia mOnSurface.
text=e8d8ffff
# Prompt glyph: Noctalia mPrimary — the signature lavender.
prompt=b58fffff
# Placeholder + input-line: slightly dimmer than text.
placeholder=8f7ab8ff
input=e8d8ffff
# Match highlights on candidate names: pop with mPrimary.
match=b58fffff
# Selected row.
selection=1a1033ff
selection-text=f3e6ffff
selection-match=d8b4ffff
# Border around the window: primary lavender, thin.
border=b58fffff
# Counter + hint text.
counter=8f7ab8ff

[border]
# Roundy.
radius=20
width=2

[dmenu]
# When used in --dmenu mode (the favorites wrapper script uses this),
# Noctalia's monospaced font gives clean fixed-width listing.
exit-immediately-if-empty=yes

[key-bindings]
# A couple of sensible chords on top of the defaults.
cancel=Escape Control+c Control+g
execute=Return KP_Enter
prev=Up Control+p
next=Down Control+n
